<style>

  .btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:12px;border:1px solid #1f2a5c;background:#151d43;color:#e6eaf5;cursor:pointer;transition:all .15s;}

  .check{appearance:none;-webkit-appearance:none;width:16px;height:16px;border:1.5px solid #3b82f6;border-radius:4px;background:transparent;cursor:pointer;position:relative;flex-shrink:0;}
  .check:checked{background:#10b981;border-color:#10b981;}
  .check:checked::after{content:"\2713";position:absolute;top:-3px;left:1px;color:#fff;font-size:13px;font-weight:700;}
  .save-chip{font-size:10px;color:#6ee7b7;padding:1px 6px;border-radius:999px;background:#10b98122;border:1px solid #10b98155;}

  .modal-dialog{background:#101736;border:1px solid #1f2a5c;border-radius:12px;width:100%;max-width:720px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;}

    .check{width:22px;height:22px;border-width:2px;}
    .check:checked::after{top:-2px;left:3px;font-size:16px;}
    .subtask-row{padding:10px 12px;gap:10px;}
    .tab-btn{padding:14px 20px !important;font-size:15px !important;}
    [data-row] td{padding-top:14px !important;padding-bottom:14px !important;}

</style>

/* ===== EDITS ===== */
const STORAGE_KEY = 'ai-center-blueprint-edits-v1';
function loadEdits() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; } }
function saveEdits(edits) { localStorage.setItem(STORAGE_KEY, JSON.stringify(edits)); flashSaveChip(); }
function getEdit(id) { const all = loadEdits(); return all[id] || { plannedStart:'', plannedEnd:'', owner:'', notes:'', subtasks: [] }; }
function updateEdit(id, patch) { const all = loadEdits(); all[id] = { ...getEdit(id), ...patch }; saveEdits(all); }
function addSubtask(id, title) { const e = getEdit(id); const st = { id:'st-'+Date.now()+'-'+Math.random().toString(36).slice(2,6), title, done:false, dueDate:'' }; updateEdit(id, { subtasks: [...e.subtasks, st] }); }
function patchSubtask(id, stId, patch) { const e = getEdit(id); updateEdit(id, { subtasks: e.subtasks.map(s => s.id===stId ? {...s,...patch} : s) }); }
function removeSubtask(id, stId) { const e = getEdit(id); updateEdit(id, { subtasks: e.subtasks.filter(s => s.id!==stId) }); }

function flashSaveChip() {
  const el = document.getElementById('save-chip');
  if (!el) return;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.style.opacity = '0'; }, 1200);
}

/* ===== CUSTOM PROJECTS ===== */
const CUSTOM_KEY = 'ai-center-custom-projects-v1';
function loadCustom() { try { return JSON.parse(localStorage.getItem(CUSTOM_KEY) || '[]'); } catch { return []; } }
function saveCustom(arr) { localStorage.setItem(CUSTOM_KEY, JSON.stringify(arr)); flashSaveChip(); }
function addCustomProject(p) { const arr = loadCustom(); arr.push(p); saveCustom(arr); }
function removeCustomProject(id) { saveCustom(loadCustom().filter(x => x.id !== id)); }
function getAllProjects() { return [...projects, ...loadCustom()]; }
function getAllDepartments() {
  const set = new Set(DEPARTMENTS);
  loadCustom().forEach(p => { if (p.department) set.add(p.department); });
  return Array.from(set);
}

/* ===== DERIVED PROGRESS ===== */
function getProjectProgress(p) {
  const e = getEdit(p.id);
  if (e.subtasks && e.subtasks.length > 0) {
    const done = e.subtasks.filter(s => s.done).length;
    return Math.round((done / e.subtasks.length) * 100);
  }
  return p.progress || 0;
}

/* ===== STATE ===== */
const state = {
  department: '\u5168\u90e8',
  status: '\u5168\u90e8',
  query: '',
  expanded: null,
  modalOpen: false,
};

function getStats(list) {
  const total = list.length;
  const done = list.filter(p => p.status === STATUS.DONE).length;
  const inProgress = list.filter(p => p.status === STATUS.IN_PROGRESS).length;
  const planning = list.filter(p => p.status === STATUS.PLANNING).length;
  const completionRate = total > 0 ? Math.round((done / total) * 100) : 0;
  return { total, done, inProgress, planning, completionRate };
}
function getStatsByDepartment(list) {
  const result = {};
  const depts = Array.from(new Set([...DEPARTMENTS, ...list.map(p => p.department)]));
  depts.forEach(dept => {
    const dp = list.filter(p => p.department === dept);
    const s = {
      total: dp.length,
      done: dp.filter(p => p.status === STATUS.DONE).length,
      inProgress: dp.filter(p => p.status === STATUS.IN_PROGRESS).length,
      planning: dp.filter(p => p.status === STATUS.PLANNING).length,
    };
    s.completionRate = s.total > 0 ? Math.round((s.done / s.total) * 100) : 0;
    result[dept] = s;
  });
  return result;
}
function getFiltered() {
  return getAllProjects().filter(p => {
    if (state.department !== '\u5168\u90e8' && p.department !== state.department) return false;
    if (state.status !== '\u5168\u90e8' && p.status !== state.status) return false;
    if (state.query) {
      const q = state.query.toLowerCase();
      if (!p.name.toLowerCase().includes(q) && !(p.tag||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

  [STATUS.IN_PROGRESS]: 'bg-amber-500/15 text-amber-300 border-amber-500/30',

function deptClass(dept) { return deptStyle[dept] || 'bg-gray-500/15 text-gray-300 border-gray-500/30'; }
const progressColor = (s) =>
  s === STATUS.DONE ? 'bg-emerald-500' :
  s === STATUS.IN_PROGRESS ? 'bg-amber-500' : 'bg-slate-500';

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

        </div>
        <form class="flex items-center gap-2" data-sub-add-form data-pid="${p.id}">
          <input type="text" class="form-input flex-1" placeholder="\u65b0\u589e\u7d30\u9805\u4efb\u52d9\uff0c\u4f8b\uff1a\u9700\u6c42\u8a2a\u8ac7\u3001\u539f\u578b\u958b\u767c..." data-sub-add-input />
          <button type="submit" class="btn btn-primary">+ \u65b0\u589e</button>
        </form>
      </div>

      ${p.isCustom ? `
        <div class="border-t border-[var(--border)]"></div>
        <div class="flex items-center justify-between">
          <div class="text-[11px] text-[var(--text-muted)]">\u6b64\u70ba\u4f7f\u7528\u8005\u81ea\u8a02\u9805\u76ee\uff08\u4e0d\u5728 Excel \u85cd\u5716\u4e2d\uff09</div>
          <button class="btn" data-delete-custom="${p.id}" style="color:#fca5a5;border-color:rgba(248,113,113,.3);background:rgba(127,29,29,.15);">\ud83d\uddd1 \u522a\u9664\u6b64\u9805\u76ee</button>
        </div>
      ` : ''}
    </div>
  `;
}

/* ===== RENDER MODAL ===== */
function renderModal(allDepartments) {
  if (!state.modalOpen) return '';
  return `
    <div class="modal-overlay" data-close-modal>
      <div class="modal-dialog" onclick="event.stopPropagation()">
        <div class="modal-header">
          <div>
            <h2 class="text-lg font-semibold">\u65b0\u589e\u958b\u767c\u9805\u76ee</h2>
            <p class="text-xs text-[var(--text-muted)] mt-0.5">\u9805\u76ee\u5efa\u7acb\u5f8c\u53ef\u5728\u5217\u8868\u4e2d\u7e7c\u7e8c\u7de8\u8f2f\u6392\u7a0b\u3001\u65b0\u589e\u7d30\u9805</p>
          </div>
          <button class="btn-danger btn" data-close-modal title="\u95dc\u9589">\u2715</button>
        </div>
        <form class="modal-body" data-submit-modal>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div>
              <label class="block text-xs text-[var(--text-muted)] mb-1">\u9805\u76ee\u540d\u7a31 <span class="text-red-400">*</span></label>
              <input type="text" class="form-input w-full" name="name" required placeholder="\u4f8b\uff1a\u65b0\u6a5f\u5668\u4eba X" />
            </div>
            <div>
              <label class="block text-xs text-[var(--text-muted)] mb-1">\u90e8\u9580 <span class="text-red-400">*</span></label>
              <input list="dept-options" type="text" class="form-input w-full" name="department" required placeholder="\u9078\u64c7\u6216\u8f38\u5165\u65b0\u90e8\u9580" value="${escapeHtml(allDepartments[0] || '\u8a55\u50f9\u90e8')}" />
              <datalist id="dept-options">
                ${allDepartments.map(d => `<option value="${escapeHtml(d)}"></option>`).join('')}
              </datalist>
            </div>
            <div>
              <label class="block text-xs text-[var(--text-muted)] mb-1">\u72c0\u614b</label>
              <select class="form-input w-full" name="status">
                <option value="\u898f\u5283\u4e2d" selected>\u898f\u5283\u4e2d</option>
                <option value="\u9032\u884c\u4e2d">\u9032\u884c\u4e2d</option>
                <option value="\u5df2\u5b8c\u6210">\u5df2\u5b8c\u6210</option>
              </select>
            </div>
            <div>
              <label class="block text-xs text-[var(--text-muted)] mb-1">\u5206\u985e / \u6a19\u7c64</label>
              <input type="text" class="form-input w-full" name="tag" placeholder="\u4f8b\uff1a\u6a5f\u5668\u4eba\u3001\u722c\u87f2" />
            </div>
            <div class="md:col-span-2">
              <label class="block text-xs text-[var(--text-muted)] mb-1">\u57f7\u884c\u983b\u7387</label>
              <input type="text" class="form-input w-full" name="frequency" placeholder="\u4f8b\uff1a\u6bcf\u500b\u6848\u4ef6\u3001\u6bcf\u6708 1 \u6b21" />
            </div>
            <div class="md:col-span-2">
              <label class="block text-xs text-[var(--text-muted)] mb-1">\u5e0c\u671b AI \u6539\u5584\u65b9\u5411</label>
              <textarea class="form-input w-full" name="aiDirection" rows="3" placeholder="\u63cf\u8ff0\u5e0c\u671b AI \u5982\u4f55\u5354\u52a9..."></textarea>
            </div>
            <div>
              <label class="block text-xs text-[var(--text-muted)] mb-1">\u9810\u671f\u8f38\u51fa\u6210\u679c</label>
              <textarea class="form-input w-full" name="expectedOutput" rows="3" placeholder="\u9810\u671f\u7522\u51fa\u4ec0\u9ebc..."></textarea>
            </div>
            <div>
              <label class="block text-xs text-[var(--text-muted)] mb-1">\u4efb\u52d9\u6b65\u9a5f / \u908f\u8f2f</label>
              <textarea class="form-input w-full" name="logic" rows="3" placeholder="\u57f7\u884c\u908f\u8f2f..."></textarea>
            </div>
          </div>
          <div class="flex items-center justify-end gap-2 mt-5 pt-4 border-t border-[var(--border)]">
            <button type="button" class="btn" data-close-modal>\u53d6\u6d88</button>
            <button type="submit" class="btn btn-primary">\u5efa\u7acb\u9805\u76ee</button>
          </div>
        </form>
      </div>
    </div>
  `;
}


/* ===== EVENT BINDING ===== */
function bind() {
  // dept / status filter buttons
  document.querySelectorAll('[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      state[btn.dataset.filter] = btn.dataset.value;
      render();
    });
  });
  // dept cards
  document.querySelectorAll('[data-dept-card]').forEach(card => {
    card.addEventListener('click', () => {
      state.department = card.dataset.deptCard;
      render();
      window.scrollTo({ top: document.body.scrollHeight/3, behavior:'smooth' });
    });
  });
  // search
  const input = document.getElementById('search-input');
  if (input) {
    input.addEventListener('input', (e) => {
      state.query = e.target.value;
      render();
      const nx = document.getElementById('search-input');
      if (nx) { nx.focus(); nx.setSelectionRange(nx.value.length, nx.value.length); }
    });
  }
  // row expand
  document.querySelectorAll('[data-row]').forEach(row => {
    row.addEventListener('click', () => {
      const id = row.dataset.row;
      state.expanded = state.expanded === id ? null : id;
      render();
    });
  });
  // edits
  document.querySelectorAll('[data-edit]').forEach(inp => {
    inp.addEventListener('change', () => { updateEdit(inp.dataset.pid, { [inp.dataset.edit]: inp.value }); });
    inp.addEventListener('blur', () => { updateEdit(inp.dataset.pid, { [inp.dataset.edit]: inp.value }); });
    inp.addEventListener('click', e => e.stopPropagation());
  });
  // subtask toggle
  document.querySelectorAll('[data-sub-toggle]').forEach(cb => {
    cb.addEventListener('click', e => e.stopPropagation());
    cb.addEventListener('change', () => {
      patchSubtask(cb.dataset.pid, cb.dataset.sid, { done: cb.checked });
      render();
    });
  });
  // subtask title
  document.querySelectorAll('[data-sub-title]').forEach(inp => {
    inp.addEventListener('click', e => e.stopPropagation());
    inp.addEventListener('change', () => { patchSubtask(inp.dataset.pid, inp.dataset.sid, { title: inp.value }); });
    inp.addEventListener('blur', () => { patchSubtask(inp.dataset.pid, inp.dataset.sid, { title: inp.value }); });
  });
  // subtask date
  document.querySelectorAll('[data-sub-date]').forEach(inp => {
    inp.addEventListener('click', e => e.stopPropagation());
    inp.addEventListener('change', () => { patchSubtask(inp.dataset.pid, inp.dataset.sid, { dueDate: inp.value }); });
  });
  // subtask remove
  document.querySelectorAll('[data-sub-remove]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      removeSubtask(btn.dataset.pid, btn.dataset.sid);
      render();
    });
  });
  // subtask add form
  document.querySelectorAll('[data-sub-add-form]').forEach(form => {
    form.addEventListener('click', e => e.stopPropagation());
    form.addEventListener('submit', e => {
      e.preventDefault();
      const inp = form.querySelector('[data-sub-add-input]');
      const v = (inp.value || '').trim();
      if (!v) return;
      addSubtask(form.dataset.pid, v);
      inp.value = '';
      render();
    });
  });
  // modal: open
  document.querySelectorAll('[data-open-modal]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.modalOpen = true;
      render();
    });
  });
  // modal: close (overlay or close/cancel buttons)
  document.querySelectorAll('[data-close-modal]').forEach(el => {
    el.addEventListener('click', (e) => {
      // only trigger if the click target IS the element itself (not children)
      if (e.currentTarget !== e.target && !e.currentTarget.classList.contains('btn')) return;
      state.modalOpen = false;
      render();
    });
  });
  // modal: submit
  document.querySelectorAll('[data-submit-modal]').forEach(form => {
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const fd = new FormData(form);
      const statusVal = fd.get('status') || '\u898f\u5283\u4e2d';
      const newProject = {
        id: 'custom-' + Date.now() + '-' + Math.random().toString(36).slice(2,6),
        department: (fd.get('department') || '').trim() || '\u672a\u5206\u985e',
        name: (fd.get('name') || '').trim(),
        status: statusVal,
        progress: statusVal === '\u5df2\u5b8c\u6210' ? 100 : (statusVal === '\u9032\u884c\u4e2d' ? 50 : 0),
        tag: (fd.get('tag') || '').trim() || '\u81ea\u8a02',
        frequency: (fd.get('frequency') || '').trim() || '\u2014',
        aiDirection: (fd.get('aiDirection') || '').trim() || '\u2014',
        expectedOutput: (fd.get('expectedOutput') || '').trim() || '\u2014',
        logic: (fd.get('logic') || '').trim() || '\u2014',
        isCustom: true,
        createdAt: new Date().toISOString(),
      };
      if (!newProject.name) { alert('\u8acb\u586b\u5beb\u9805\u76ee\u540d\u7a31'); return; }
      addCustomProject(newProject);
      state.modalOpen = false;
      state.expanded = newProject.id;
      if (state.department !== '\u5168\u90e8' && state.department !== newProject.department) {
        state.department = '\u5168\u90e8';
      }
      render();
    });
  });
  // delete custom project
  document.querySelectorAll('[data-delete-custom]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.deleteCustom;
      if (!confirm('\u78ba\u5b9a\u8981\u522a\u9664\u9019\u500b\u9805\u76ee\u55ce\uff1f\u6b64\u52d5\u4f5c\u7121\u6cd5\u5fa9\u539f\u3002')) return;
      removeCustomProject(id);
      if (state.expanded === id) state.expanded = null;
      render();
    });
  });
}

// bootstrap
render();
</script>
</body>
</html>
